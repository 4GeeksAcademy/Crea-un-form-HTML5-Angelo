<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> form HTML5</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Estilo para el contenedor gris de los iconos de tarjetas */
        .card-icons-container {
            background-color: #6c757d;
            padding: 8px 15px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            color: white;
        }

        /* Eliminar el borde azul de enfoque si quieres que se vea más limpio */
        .form-select:focus,
        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10">

                <div class="card shadow-sm">
                    <div class="card-header bg-white py-3">
                        <h3 class="mb-0">Payment form example</h3>
                    </div>

                    <form action="#" method="POST" class="needs-validation" novalidate>
                        <div class="card-body">

                            <div class="alert alert-danger mb-4" role="alert">
                                Some fields are missing
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-5">
                                    <label for="cardNum" class="form-label fw-semibold">Card #</label>
                                    <input type="text" class="form-control" id="cardNum" placeholder="XXXXXXXXXXXXXXXX"
                                        required>
                                </div>
                                <div class="col-md-3">
                                    <label for="cvc" class="form-label fw-semibold">CVC #</label>
                                    <input type="text" class="form-control" id="cvc" placeholder="0000" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="amount" class="form-label fw-semibold">Amount</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-0 ps-0 fw-bold">$</span>
                                        <input type="number" class="form-control" id="amount" placeholder="Amount"
                                            required>
                                    </div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="firstName" class="form-label fw-semibold">First Name</label>
                                    <input type="text" class="form-control" id="firstName" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="lastName" class="form-label fw-semibold">Last Name</label>
                                    <input type="text" class="form-control" id="lastName" required>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="city" class="form-label fw-semibold">City</label>
                                    <input type="text" class="form-control" id="city" required>
                                </div>
                                <div class="col-md-3">
                                    <label for="state" class="form-label fw-semibold">State</label>
                                    <div class="input-group">
                                        <select class="form-select" id="state" required>
                                            <option selected disabled value="">Pick a state</option>
                                            <option value="1">Miranda</option>
                                            <option value="2">Zulia</option>
                                            <option value="3">Aragua</option>
                                            <option value="4">Carabobo</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <label for="postalCode" class="form-label fw-semibold">Postal Code</label>
                                    <input type="text" class="form-control" id="postalCode" required>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label d-block fw-semibold">We accept:</label>
                                    <div class="card-icons-container">
                                        <div class="form-check form-check-inline m-0">
                                            <input class="form-check-input" type="radio" name="pay" id="mc" checked
                                                required>
                                            <label class="form-check-label" for="mc"><i
                                                    class="fa-brands fa-cc-mastercard fa-lg"></i></label>
                                        </div>
                                        <div class="form-check form-check-inline m-0">
                                            <input class="form-check-input" type="radio" name="pay" id="vs">
                                            <label class="form-check-label" for="vs"><i
                                                    class="fa-brands fa-cc-visa fa-lg"></i></label>
                                        </div>
                                        <div class="form-check form-check-inline m-0">
                                            <input class="form-check-input" type="radio" name="pay" id="dc">
                                            <label class="form-check-label" for="dc"><i
                                                    class="fa-brands fa-cc-diners-club fa-lg"></i></label>
                                        </div>
                                        <div class="form-check form-check-inline m-0">
                                            <input class="form-check-input" type="radio" name="pay" id="ax">
                                            <label class="form-check-label" for="ax"><i
                                                    class="fa-brands fa-cc-amex fa-lg"></i></label>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label for="message" class="form-label fw-semibold">Message</label>
                                    <textarea class="form-control" id="message" rows="3"></textarea>
                                    <div class="form-text text-muted small">Add any notes here.</div>
                                </div>
                            </div>
                            <div class="card-footer bg-light py-3 d-flex justify-content-end gap-2">
                                <button type="button" class="btn btn-secondary">Cancel</button>
                                <button type="button" class="btn btn-primary">Send</button>
                            </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
